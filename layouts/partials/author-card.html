{{ with site.Params.Author -}}
<div class="media author-card h-card" itemprop="author" itemscope itemtype="http://schema.org/Person">
	{{ if .Image }}{{ partialCached "author-image" $ }}{{ end }}
	{{ with .Name }}<h2 class="fn author-name" itemprop="name">{{ . }}</h2>{{ end }}
	{{ with .Description }}<p class="author-description" itemprop="description">{{ . }}</p>{{ end }}
</div>
{{- end }}
