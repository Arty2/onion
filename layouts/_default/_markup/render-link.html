{{- $url := urls.Parse .Destination -}}
{{- $link := $url.String -}}
{{- if not $url.IsAbs -}}
	{{- with .Page.GetPage $url.Path }}
		{{ $link = printf "%s%s" .RelPermalink $url.Fragment }}
	{{ end }}
{{- end -}}
<a href="{{ $link | safeURL }}"
 {{- with .Title}} title="{{ . }}"{{ end -}}
 {{- if $url.IsAbs }} data-src="external"{{ end -}}
>{{- with .Text }}{{ . }}{{ end -}}</a>
{{- /* trim trailing newline */ -}}
