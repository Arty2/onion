{{ define "main" }}
	{{ if gt (len .Content) 0 }}
		{{ .Content }}
	{{ end }}
	<details class="articles-list" open>
	<summary><h2>{{ i18n (.Name | lower) }}</h2></summary>
		{{ with .Pages }}
		<div class="wrapper">
			{{ range . }}
				{{ partial "article" . }}
			{{ end }}
		</div>
		{{ end }}
	</details>
{{ end }}
